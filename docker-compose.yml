services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      RAISEFN_DATABASE_URL: postgresql+asyncpg://tracker:tracker@db:5432/tracker
      RAISEFN_REDIS_URL: redis://redis:6379/0
      RAISEFN_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  redisdata:
